version: '3.8'

services:

  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: tani_hub_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       tani_hub
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: tanihub2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tani_hub_net

  # ── Backend API ────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: tani_hub_api
    restart: unless-stopped
    environment:
      PORT:                    5000
      NODE_ENV:                production
      DB_HOST:                 postgres
      DB_PORT:                 5432
      DB_NAME:                 tani_hub
      DB_USER:                 postgres
      DB_PASSWORD:             tanihub2024
      JWT_SECRET:              change-this-in-production-super-secret-key
      JWT_EXPIRE:              7d
      CLOUDINARY_CLOUD_NAME:   ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY:      ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET:   ${CLOUDINARY_API_SECRET:-}
      ALLOWED_ORIGIN:          http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tani_hub_net
    command: >
      sh -c "node src/config/migrate.js && node src/seeds/index.js && node src/index.js"

  # ── Frontend ───────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: tani_hub_fe
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - tani_hub_net

volumes:
  postgres_data:

networks:
  tani_hub_net:
    driver: bridge
